name: ShopNest CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-package:
    name: Build, Lint and Package PHP App
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up PHP environment for linting/checks
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, gd, zip, mysqli
          coverage: none

      # 3. Set up JDK environment for Maven execution
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 4. Build, run lint checks, and package the application using Maven
      - name: Build and package with Maven
        run: mvn clean package

      # 5. Archive and upload the generated deployment packages
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shopnest-deployment-packages
          path: |
            target/*.zip
            target/*.tar.gz
          retention-days: 7
